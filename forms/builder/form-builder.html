<!-- ============================================================
     form-builder.html — フォームビルダー(スキーマを、ダイアログで編集)

     運用する人は、これで、項目を、追加・編集・並べ替え・削除する。
     生の JSON を、手で書かない。左で編集 → 右に、即プレビュー。
     下の「スキーマ(JSON)」を、コピーして、.adoc の role=form ブロックや、
     ページの schema に、貼る。

     この画面(ビルダー)は、仕組み。form-render.js を、そのまま使う。
     ============================================================ -->
<meta charset="utf-8">
<title>フォームビルダー</title>
<link rel="stylesheet" href="form.css">
<style>
  body { font-family: sans-serif; margin: 1.5em; color: #222; }
  h1 { font-size: 1.4em; }
  .b-cols { display: flex; gap: 2em; align-items: flex-start; flex-wrap: wrap; }
  .b-col { flex: 1 1 380px; min-width: 320px; }
  .b-config label { display: inline-block; margin-right: 1.5em; }
  .b-config input { width: 22em; }
  .b-list { list-style: none; padding: 0; margin: .5em 0; }
  .b-item { display: flex; align-items: center; gap: .5em; padding: .5em .7em;
            border: 1px solid #ddd; border-radius: 4px; margin-bottom: .4em; background: #fafafa; }
  .b-item .b-grow { flex: 1; }
  .b-item .b-name { color: #888; font-size: .85em; }
  .b-item button { padding: .2em .5em; cursor: pointer; }
  .b-add { padding: .6em 1.2em; cursor: pointer; margin-top: .5em; }
  .b-preview { border: 1px solid #ddd; border-radius: 6px; padding: 1.5em; }
  textarea#b-json { width: 100%; height: 12em; font-family: monospace; font-size: .85em; }
  dialog { width: min(90vw, 460px); border: 1px solid #bbb; border-radius: 8px; padding: 1.5em; }
  dialog h3 { margin-top: 0; }
  dialog label { display: block; margin-bottom: .8em; font-size: .95em; }
  dialog input[type=text], dialog select, dialog textarea { width: 100%; padding: .4em; box-sizing: border-box; }
  dialog textarea { min-height: 5em; }
  dialog .d-inline { display: flex; align-items: center; gap: .4em; }
  .d-buttons { display: flex; gap: 1em; justify-content: flex-end; margin-top: 1em; }
  .d-buttons button { padding: .5em 1.2em; cursor: pointer; }
</style>

<h1>フォームビルダー</h1>

<div class="b-config">
  <label>送信先(action)<br><input type="text" id="b-action" placeholder="https://&lt;WORKER&gt;/submit"></label>
  <label>Turnstile sitekey<br><input type="text" id="b-sitekey" placeholder="0x…(空ならTurnstileなし)"></label>
</div>

<div class="b-cols">
  <div class="b-col">
    <h2>項目</h2>
    <ul class="b-list" id="b-list"></ul>
    <button class="b-add" id="b-add">＋ 項目を追加</button>

    <h2>スキーマ(JSON)</h2>
    <p>これを、.adoc の <code>role=form</code> ブロックや、ページの schema に、貼る。</p>
    <textarea id="b-json" readonly></textarea>
  </div>

  <div class="b-col">
    <h2>プレビュー</h2>
    <div class="b-preview"><div id="b-form"></div></div>
  </div>
</div>

<!-- 項目の編集ダイアログ -->
<dialog id="b-dialog">
  <h3 id="d-title">項目の編集</h3>
  <label>表示名(label)<input type="text" id="d-label"></label>
  <label>キー(name / 送信キー)<input type="text" id="d-name"></label>
  <label>種類(type)
    <select id="d-type">
      <option value="text">テキスト</option>
      <option value="email">メール</option>
      <option value="tel">電話</option>
      <option value="textarea">複数行</option>
      <option value="select">プルダウン</option>
      <option value="radio">ラジオ</option>
      <option value="checkbox">チェックボックス</option>
    </select>
  </label>
  <label class="d-inline"><input type="checkbox" id="d-required"> 必須</label>
  <label>ヘルプ(help / 常に見える説明)<input type="text" id="d-help"></label>
  <label>例示(placeholder / 薄い例)<input type="text" id="d-placeholder"></label>
  <label id="d-format-row">書式(format)
    <select id="d-format">
      <option value="">(なし)</option>
      <option value="postal">郵便番号</option>
      <option value="tel">電話番号</option>
      <option value="katakana">カタカナ</option>
      <option value="hiragana">ひらがな</option>
      <option value="hankakuNumber">半角数字</option>
    </select>
  </label>
  <label>初期値(default)<input type="text" id="d-default"></label>
  <label>一致確認(match / 別の項目のキー)<input type="text" id="d-match" placeholder="例)your-email"></label>
  <label id="d-options-row">選択肢(1行に1つ)<textarea id="d-options"></textarea></label>
  <div class="d-buttons">
    <button type="button" id="d-cancel">キャンセル</button>
    <button type="button" id="d-save">保存</button>
  </div>
</dialog>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="form-render.js"></script>
<script>
(function () {
  // 初期スキーマ(例)
  const schema = {
    action: "https://<WORKER>/submit",
    sitekey: "",
    confirm: true,
    fields: [
      { name: "your-name",  label: "お名前",   type: "text",     required: true, placeholder: "例)山田 太郎" },
      { name: "kana",       label: "フリガナ", type: "text",     required: true, format: "katakana", help: "全角カタカナで" },
      { name: "your-email", label: "メールアドレス", type: "email", required: true },
      { name: "your-message", label: "お問い合わせ内容", type: "textarea", required: true }
    ]
  };

  const $ = id => document.getElementById(id);
  const listEl = $('b-list'), dialog = $('b-dialog');
  let editIndex = null;

  $('b-action').value = schema.action;
  $('b-sitekey').value = schema.sitekey;
  $('b-action').addEventListener('input', e => { schema.action = e.target.value; refresh(); });
  $('b-sitekey').addEventListener('input', e => { schema.sitekey = e.target.value; refresh(); });

  // 種類で、書式・選択肢の欄を、出し分け
  function syncDialogRows() {
    const t = $('d-type').value;
    $('d-options-row').style.display = (t === 'select' || t === 'radio' || t === 'checkbox') ? '' : 'none';
    $('d-format-row').style.display  = (t === 'text' || t === 'tel') ? '' : 'none';
  }
  $('d-type').addEventListener('change', syncDialogRows);

  function openDialog(index) {
    editIndex = index;
    const f = index == null ? { type: 'text' } : schema.fields[index];
    $('d-title').textContent = index == null ? '項目を追加' : '項目の編集';
    $('d-label').value = f.label || '';
    $('d-name').value = f.name || '';
    $('d-type').value = f.type || 'text';
    $('d-required').checked = !!f.required;
    $('d-help').value = f.help || '';
    $('d-placeholder').value = f.placeholder || '';
    $('d-format').value = f.format || '';
    $('d-default').value = Array.isArray(f.default) ? f.default.join('\n') : (f.default || '');
    $('d-match').value = f.match || '';
    $('d-options').value = (f.options || []).join('\n');
    syncDialogRows();
    dialog.showModal();
  }

  function saveDialog() {
    const t = $('d-type').value;
    const f = { name: $('d-name').value.trim(), label: $('d-label').value.trim(), type: t };
    if ($('d-required').checked) f.required = true;
    if ($('d-help').value.trim()) f.help = $('d-help').value.trim();
    if ($('d-placeholder').value.trim()) f.placeholder = $('d-placeholder').value.trim();
    if ((t === 'text' || t === 'tel') && $('d-format').value) f.format = $('d-format').value;
    if ($('d-match').value.trim()) f.match = $('d-match').value.trim();
    const opts = $('d-options').value.split('\n').map(s => s.trim()).filter(Boolean);
    if (t === 'select' || t === 'radio' || t === 'checkbox') f.options = opts;
    const def = $('d-default').value.trim();
    if (def) f.default = (t === 'checkbox') ? def.split('\n').map(s => s.trim()).filter(Boolean) : def;

    if (!f.name || !f.label) { alert('表示名と、キー(name)は、必須です。'); return; }
    if (editIndex == null) schema.fields.push(f); else schema.fields[editIndex] = f;
    dialog.close();
    refresh();
  }

  $('b-add').addEventListener('click', () => openDialog(null));
  $('d-save').addEventListener('click', saveDialog);
  $('d-cancel').addEventListener('click', () => dialog.close());

  function move(i, d) {
    const j = i + d;
    if (j < 0 || j >= schema.fields.length) return;
    const t = schema.fields[i]; schema.fields[i] = schema.fields[j]; schema.fields[j] = t;
    refresh();
  }
  function remove(i) { if (confirm('この項目を、削除しますか?')) { schema.fields.splice(i, 1); refresh(); } }

  function renderList() {
    listEl.innerHTML = '';
    schema.fields.forEach((f, i) => {
      const li = document.createElement('li');
      li.className = 'b-item';
      li.innerHTML =
        '<span class="b-grow"><strong>' + esc(f.label) + '</strong>' +
        (f.required ? ' <span style="color:#c0392b">必須</span>' : '') +
        ' <span class="b-name">' + esc(f.name) + ' / ' + f.type + '</span></span>';
      const mk = (t, fn) => { const b = document.createElement('button'); b.textContent = t; b.onclick = fn; return b; };
      li.append(mk('↑', () => move(i, -1)), mk('↓', () => move(i, 1)),
                mk('編集', () => openDialog(i)), mk('削除', () => remove(i)));
      listEl.append(li);
    });
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }

  function refresh() {
    renderList();
    $('b-json').value = JSON.stringify(schema, null, 2);
    FormRescue.render($('b-form'), schema);
  }

  refresh();
})();
</script>
