<!-- ============================================================
     FormRescue 入力フォーム(確認画面つき)
     MW WP Form 相当の使い勝手を、素のHTML+バニラJSで。
     フレームワーク不使用(FormRescue の実装方針に合わせる)。

     使い方:
       - <WORKER>  … FormRescue の Worker の /submit URL に置き換える
       - 0xSITEKEY … Cloudflare Turnstile の site key に置き換える
       - 項目を足す/減らすときは、.fr-field を追加/削除するだけ。
         確認画面・バリデーション・送信は、data-* 属性を見て、自動で対応する。

     data-* 属性:
       data-label     確認画面での表示名(必須)
       data-required  入力必須にする
       data-match     "別の項目のname" を指定 → 値が一致しないとエラー
                      (メールアドレス確認に使う)
     ============================================================ -->

<style>
  #fr-form { max-width: 640px; margin: 0 auto; }
  .fr-screen[hidden] { display: none; }
  .fr-field { margin-bottom: 1.2em; }
  .fr-field > label { display: block; font-weight: 700; margin-bottom: .4em; }
  .fr-field input[type="text"], .fr-field input[type="email"],
  .fr-field input[type="tel"], .fr-field textarea,
  .fr-field select { width: 100%; padding: .5em; box-sizing: border-box; }
  .fr-field textarea { min-height: 8em; }
  .fr-req { color: #c0392b; font-size: .8em; margin-left: .4em; }
  .fr-choice { display: inline-block; margin-right: 1em; font-weight: 400; }
  .fr-error, .fr-status { color: #c0392b; min-height: 1.4em; }
  #fr-review { border-top: 1px solid #ccc; }
  #fr-review dt { font-weight: 700; margin-top: .8em; }
  #fr-review dd { margin: .2em 0 .8em; padding-bottom: .8em;
                  border-bottom: 1px solid #eee; white-space: pre-wrap; }
  .fr-buttons { display: flex; gap: 1em; margin-top: 1.5em; }
  .fr-buttons button { padding: .7em 1.6em; cursor: pointer; }
</style>

<div id="fr-form">

  <!-- ===== 入力画面 ===== -->
  <div class="fr-screen" data-screen="input">
    <form id="fr-input" novalidate>

      <div class="fr-field">
        <label>お名前<span class="fr-req">必須</span></label>
        <input type="text" name="your-name" data-label="お名前" data-required
               placeholder="例)山田 太郎">
      </div>

      <div class="fr-field">
        <label>会社名<span class="fr-req">必須</span></label>
        <input type="text" name="company" data-label="会社名" data-required
               placeholder="例)株式会社〇〇">
      </div>

      <div class="fr-field">
        <label>メールアドレス<span class="fr-req">必須</span></label>
        <input type="email" name="your-email" data-label="メールアドレス" data-required
               placeholder="例)sample@example.com">
      </div>

      <div class="fr-field">
        <label>メールアドレス(確認)<span class="fr-req">必須</span></label>
        <input type="email" name="your-email2" data-label="メールアドレス(確認)"
               data-required data-match="your-email"
               placeholder="もう一度、入力してください">
      </div>

      <div class="fr-field">
        <label>電話番号</label>
        <input type="tel" name="tel" data-label="電話番号"
               placeholder="例)090-0000-0000">
      </div>

      <div class="fr-field">
        <label>お問い合わせ種別<span class="fr-req">必須</span></label>
        <select name="category" data-label="お問い合わせ種別" data-required>
          <option value="">選択してください</option>
          <option value="サービスについて">サービスについて</option>
          <option value="お見積り">お見積り</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="fr-field">
        <label>ご希望の連絡方法</label>
        <label class="fr-choice"><input type="radio" name="contact-pref"
               data-label="ご希望の連絡方法" value="メール">メール</label>
        <label class="fr-choice"><input type="radio" name="contact-pref"
               data-label="ご希望の連絡方法" value="電話">電話</label>
      </div>

      <div class="fr-field">
        <label>興味のある項目(複数可)</label>
        <label class="fr-choice"><input type="checkbox" name="interest"
               data-label="興味のある項目" value="導入相談">導入相談</label>
        <label class="fr-choice"><input type="checkbox" name="interest"
               data-label="興味のある項目" value="資料請求">資料請求</label>
        <label class="fr-choice"><input type="checkbox" name="interest"
               data-label="興味のある項目" value="デモ希望">デモ希望</label>
      </div>

      <div class="fr-field">
        <label>お問い合わせ内容<span class="fr-req">必須</span></label>
        <textarea name="your-message" data-label="お問い合わせ内容" data-required
                  placeholder="お問い合わせ内容を、ご記入ください"></textarea>
      </div>

      <p class="fr-error" aria-live="polite"></p>
      <div class="fr-buttons">
        <button type="submit">確認する</button>
      </div>
    </form>
  </div>

  <!-- ===== 確認画面 ===== -->
  <div class="fr-screen" data-screen="confirm" hidden>
    <p>以下の内容で、よろしいですか?</p>
    <dl id="fr-review"></dl>

    <div class="cf-turnstile" data-sitekey="0xSITEKEY"
         data-callback="frTurnstileOK" data-expired-callback="frTurnstileExpired"></div>

    <p class="fr-status" aria-live="polite"></p>
    <div class="fr-buttons">
      <button type="button" id="fr-back">修正する</button>
      <button type="button" id="fr-send">送信する</button>
    </div>
  </div>

  <!-- ===== 完了画面 ===== -->
  <div class="fr-screen" data-screen="done" hidden>
    <p>送信しました。お問い合わせ、ありがとうございました。</p>
    <p>ご入力のメールアドレスに、受付確認のご連絡をお送りします。</p>
  </div>

</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script>
(function () {
  const WORKER = 'https://<WORKER>/submit';   // ← 置き換える

  const root    = document.getElementById('fr-form');
  const form    = document.getElementById('fr-input');
  const review  = document.getElementById('fr-review');
  const errorEl = form.querySelector('.fr-error');
  const statusEl = root.querySelector('[data-screen="confirm"] .fr-status');

  let turnstileToken = '';
  window.frTurnstileOK      = function (t) { turnstileToken = t; };
  window.frTurnstileExpired = function ()  { turnstileToken = ''; };

  // 画面切り替え
  function show(name) {
    root.querySelectorAll('.fr-screen').forEach(s => { s.hidden = s.dataset.screen !== name; });
    window.scrollTo(0, 0);
  }

  // 入力値の収集: name -> { label, value }。checkbox は配列。
  function collect() {
    const out = {};
    form.querySelectorAll('[name]').forEach(el => {
      const name = el.name, label = el.dataset.label || name;
      if (el.type === 'checkbox') {
        if (!out[name]) out[name] = { label, value: [] };
        if (el.checked) out[name].value.push(el.value);
      } else if (el.type === 'radio') {
        if (!out[name]) out[name] = { label, value: '' };
        if (el.checked) out[name].value = el.value;
      } else {
        out[name] = { label, value: el.value };
      }
    });
    return out;
  }

  // バリデーション。日本語メッセージ。最初のエラーを返す(なければ null)。
  function validate(data) {
    for (const el of form.querySelectorAll('[data-required]')) {
      const v = data[el.name].value;
      const empty = Array.isArray(v) ? v.length === 0 : !String(v).trim();
      if (empty) return data[el.name].label + 'を入力してください。';
    }
    for (const el of form.querySelectorAll('input[type="email"]')) {
      const v = data[el.name].value;
      if (v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v))
        return data[el.name].label + 'の形式が正しくありません。';
    }
    for (const el of form.querySelectorAll('[data-match]')) {
      if (data[el.name].value !== data[el.dataset.match].value)
        return 'メールアドレスが一致しません。';
    }
    return null;
  }

  // 「確認する」: 検証 → 確認画面に、入力値を並べる
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const data = collect();
    const err = validate(data);
    if (err) { errorEl.textContent = err; return; }
    errorEl.textContent = '';

    review.innerHTML = '';
    for (const name in data) {
      const { label, value } = data[name];
      const shown = Array.isArray(value) ? value.join('、') : value;
      const dt = document.createElement('dt'); dt.textContent = label;
      const dd = document.createElement('dd'); dd.textContent = shown || '(未入力)';
      review.append(dt, dd);
    }
    show('confirm');
  });

  // 「修正する」
  document.getElementById('fr-back').addEventListener('click', () => show('input'));

  // 「送信する」: Turnstile 確認 → Worker に POST
  document.getElementById('fr-send').addEventListener('click', async function () {
    if (!turnstileToken) { statusEl.textContent = '認証(確認)を完了してください。'; return; }

    const data = collect();
    const payload = {};
    for (const name in data) {
      const v = data[name].value;
      payload[name] = Array.isArray(v) ? v.join(',') : v;
    }
    payload['cf-turnstile-response'] = turnstileToken;

    statusEl.textContent = '送信中...';
    this.disabled = true;
    try {
      const res = await fetch(WORKER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.ok) { show('done'); return; }
      statusEl.textContent = (res.status === 429)
        ? '送信が集中しています。時間をおいて、もう一度お試しください。'
        : '送信に失敗しました。時間をおいて、もう一度お試しください。';
    } catch (_) {
      statusEl.textContent = '通信エラーが発生しました。接続をご確認ください。';
    } finally {
      this.disabled = false;
      if (window.turnstile) { window.turnstile.reset(); turnstileToken = ''; }
    }
  });
})();
</script>
