[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pyaozora"
version = "0.1.0"
description = "青空文庫の注記付きテキストを、公式サイトと同じXHTMLに変換する（基本データとPythonだけで作る）"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["aozora", "aozorabunko", "japanese", "xhtml", "converter"]
dependencies = ["aozorabunko"]

[project.optional-dependencies]
# 外字グリフのサブセット埋め込み（gaiji='font', embed_font=True）
font = ["fonttools>=4.40", "brotli"]

[tool.setuptools]
packages = ["pyaozora"]
