[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aozorabunko"
version = "0.1.0"
description = "青空文庫をPythonから ── 静的な正本だけに依存する検索・パース・変換ライブラリ"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["aozora", "aozorabunko", "japanese", "ebook", "epub"]
dependencies = []

[project.scripts]
# Shift_JIS 注記付きテキスト → Unicode JSON
aozorabunko = "aozorabunko.__main__:main"

[project.optional-dependencies]
epub = ["ebooklib>=0.18"]
# 縦書き・原稿用紙・PDF組版は aiseed-dev/washi-md に委譲（Phase 7 で結線）。
# to_markdown() が傍点の bouten 記法を出すため 0.9 以上（PyPI 公開済み）。
washi = ["washi-md>=0.9"]
# 全作品コーパスの列指向エクスポート（研究・NLP・RAG向け）
parquet = ["pyarrow>=14"]

[tool.setuptools]
packages = ["aozorabunko"]

[tool.setuptools.package-data]
# 外字対応表（JIS X 0213 面区点 → Unicode, aozora2html由来 CC0）を同梱
aozorabunko = ["data/*.json"]
