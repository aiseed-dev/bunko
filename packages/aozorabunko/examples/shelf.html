<style>
  :root{

    letter-spacing:.02em; } .summary b{ color:var(--ink-soft); font-variant-numeric:tabular-nums; }

  .controls{ display:flex; gap:.8rem; align-items:center; flex-wrap:wrap; margin-bottom:1.1rem; }
  .tabs{ display:flex; flex-wrap:wrap; gap:.3rem; }
  .tabs button{ font-family:var(--serif); font-size:1rem; width:2.1em; height:2.1em;
    border:1px solid var(--rule); border-radius:50%; background:var(--paper-hi);
    color:var(--ink-soft); cursor:pointer; transition:background .16s,color .16s; padding:0; }

  .search{ font-family:var(--serif); font-size:.95rem; padding:.42rem .8rem; flex:1 1 12rem;
    min-width:10rem; border:1px solid var(--rule); border-radius:999px;
    background:var(--paper-hi); color:var(--ink); }
  .search:focus-visible{ outline:2px solid var(--shu); outline-offset:1px; }

  .shelf{ column-width:22rem; column-gap:2rem; }
  .author{ break-inside:avoid; padding:.7rem 0; border-bottom:1px solid var(--rule); }
  .author h3{ margin:0; font-size:1.12rem; font-weight:600; letter-spacing:.03em;
    display:flex; align-items:baseline; gap:.5rem; }
  .yomi{ font-size:.74rem; color:var(--muted); font-weight:400; letter-spacing:.06em; }
  .count{ margin-inline-start:auto; font-family:system-ui,sans-serif; font-size:.72rem;
    color:var(--shu); background:var(--shu-soft); border-radius:999px; padding:.08rem .6rem;
    font-variant-numeric:tabular-nums; }
  .titles{ margin:.3rem 0 0; font-size:.86rem; color:var(--ink-soft); line-height:1.7; }
  .titles .more{ color:var(--muted); }
  .empty{ color:var(--muted); font-family:system-ui,sans-serif; padding:2rem 0; }
  .thesis{ margin-top:1.4rem; padding-top:1rem; border-top:1px solid var(--rule);
    font-size:.9rem; color:var(--ink-soft); max-width:62ch; line-height:1.75; }
  .thesis b{ color:var(--shu); font-weight:600; }
  @media (prefers-reduced-motion:no-preference){ .stage{ animation:rise .5s ease both; }
    @keyframes rise{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} } }
</style>

<script>
(function(){
  const D = JSON.parse(document.getElementById('shelf-data').textContent);
  const ROWS = ['あ','か','さ','た','な','は','ま','や','ら','わ','その他'];
  document.getElementById('na').textContent = D.length.toLocaleString();
  document.getElementById('nw').textContent = D.reduce((n,a)=>n+a.c,0).toLocaleString();

  let row = 'あ', q = '';
  const shelf = document.getElementById('shelf');
  const tabs = document.getElementById('tabs');
  ['すべて',...ROWS].forEach(r=>{
    const b=document.createElement('button'); b.textContent=r==='すべて'?'全':r;
    b.title=r; b.setAttribute('aria-pressed', r==='あ');
    b.onclick=()=>{ row=r; [...tabs.children].forEach(x=>x.setAttribute('aria-pressed','false'));
      b.setAttribute('aria-pressed','true'); render(); };
    tabs.appendChild(b);
  });
  document.getElementById('q').addEventListener('input', e=>{ q=e.target.value.trim(); render(); });

  function render(){
    const list = D.filter(a=>
      (row==='すべて' || a.r===row) &&
      (!q || a.a.includes(q) || a.y.includes(q)));
    if(!list.length){ shelf.innerHTML='<p class="empty">該当する作家がいません。</p>'; return; }
    shelf.innerHTML='';
    for(const a of list){
      const el=document.createElement('div'); el.className='author';
      const more = a.c>a.w.length ? `<span class="more">…他 ${a.c-a.w.length} 作</span>` : '';
      el.innerHTML =
        `<h3>${esc(a.a)}<span class="yomi">${esc(a.y)}</span><span class="count">${a.c}</span></h3>`+
        `<p class="titles">${a.w.map(t=>'『'+esc(t)+'』').join('')}${more}</p>`;
      shelf.appendChild(el);
    }
  }
  function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  render();
})();
</script>
